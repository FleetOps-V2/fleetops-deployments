apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy-to-gateway
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-platform
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fleetops-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: fleetops-gateway-proxy
    ports:
    - protocol: TCP
      port: 80
  - from:
    - namespaceSelector:
        matchLabels:
          name: kgateway-system
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow gateway to reach fleetops-dev services
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: fleetops-dev
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP
      port: 80    # Frontend
  # Allow gateway to reach fleetops-prod services
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: fleetops-prod
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP
      port: 80    # Frontend
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-proxy-dns
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-platform
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fleetops-gateway-proxy
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

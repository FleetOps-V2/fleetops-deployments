apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-monitoring
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-network-policy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/environment: platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fleetops-gateway
  policyTypes:
    - Egress
  egress:
    # Allow gateway to reach Grafana in monitoring namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 80

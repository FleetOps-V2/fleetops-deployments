apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-proxy-dns
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/component: networkpolicy
    app.kubernetes.io/environment: platform
    app.kubernetes.io/name: fleetops-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fleetops-gateway-proxy
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow gateway proxy to reach fleetops-platform (for gateway itself)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleetops-platform
      ports:
        - protocol: TCP
          port: 80
    # Allow gateway proxy to reach fleetops-dev (for frontend and backend services)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleetops-dev
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
    # Allow gateway proxy to reach fleetops-prod (for frontend and backend services)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleetops-prod
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080

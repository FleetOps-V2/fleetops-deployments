apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-public-to-gateway-proxy
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-platform
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fleetops-gateway-proxy
  policyTypes:
  - Ingress
  ingress:
  - from: []  # Allow from any source (external HAProxy)
    ports:
    - protocol: TCP
      port: 80
  - from: []  # Allow from any source for NodePort access
    ports:
    - protocol: TCP
      port: 30082

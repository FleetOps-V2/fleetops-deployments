apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-platform
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector: {}  # Select all pods in namespace
  policyTypes:
  - Ingress
  ingress: []  # Deny all ingress by default

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-service-discovery
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-prod
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector: {}  # All pods in namespace
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}  # Any pod in same namespace
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP
      port: 80    # Frontend

  # Allow AWS ALB — target type ip means ALB sends from its VPC IPs (10.2.0.0/16)
  - from:
    - ipBlock:
        cidr: 10.2.0.0/16
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP
      port: 80    # Frontend

  # Allow Prometheus to scrape metrics (if deployed later)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 8080  # Actuator metrics port

  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  - to:
      - podSelector: {}  # Allow to any pod in same namespace
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP
      port: 80    # Frontend

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-service-discovery
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-prod
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector: {}  # All pods in namespace
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow service discovery within same namespace
  - to: []  # Allow to any pod in same namespace
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP  
      port: 80    # Frontend
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
  # Allow gateway from fleetops-platform namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: fleetops-platform
    ports:
    - protocol: TCP
      port: 8080  # Backend services
    - protocol: TCP
      port: 80    # Frontend

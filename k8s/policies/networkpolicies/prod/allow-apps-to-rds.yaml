apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-rds
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/environment: prod
spec:
  podSelector: {}   # applies to all pods in fleetops-prod
  policyTypes:
    - Egress
  egress:
    # RDS PostgreSQL — private subnet range
    - to:
        - ipBlock:
            cidr: 10.2.0.0/16
      ports:
        - protocol: TCP
          port: 5432
    # ElastiCache Redis
    - to:
        - ipBlock:
            cidr: 10.2.0.0/16
      ports:
        - protocol: TCP
          port: 6379
    # EFS NFS — mount targets in private subnets (maintenance-service media storage)
    - to:
        - ipBlock:
            cidr: 10.2.0.0/16
      ports:
        - protocol: TCP
          port: 2049
    # HTTPS — Secrets Manager, SSM, ECR, Bedrock, SNS, Step Functions (all via VPC endpoints or NAT)
    - to:
        - ipBlock:
            cidr: 10.2.0.0/16
      ports:
        - protocol: TCP
          port: 443
    # HTTPS — external AWS APIs via NAT gateway (catch-all for services without VPC endpoints)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.2.0.0/16
      ports:
        - protocol: TCP
          port: 443
    # DNS resolution (kube-dns in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

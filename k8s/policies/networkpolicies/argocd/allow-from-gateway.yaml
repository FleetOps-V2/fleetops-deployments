apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-argocd-netpol
    app.kubernetes.io/component: networkpolicy
    app.kubernetes.io/part-of: argocd
spec:
  # Scope strictly to argocd-server pods only
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  policyTypes:
    - Ingress
  ingress:
    # Allow inbound traffic from the fleetops-platform gateway namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleetops-platform
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080

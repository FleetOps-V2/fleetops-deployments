apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-fleetops-to-monitoring
  namespace: monitoring
  labels:
    app.kubernetes.io/name: fleetops-reference-grant
    app.kubernetes.io/component: gateway
    app.kubernetes.io/environment: monitoring
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: fleetops-dev
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: fleetops-prod
  to:
    - group: ""
      kind: Service
      name: monitoring-grafana

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: monitoring
  labels:
    app.kubernetes.io/name: fleetops-network-policy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/environment: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleetops-platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: fleetops-gateway-proxy
      ports:
        - protocol: TCP
          port: 80

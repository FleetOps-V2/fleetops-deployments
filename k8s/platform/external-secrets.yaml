apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleetops-postgres-secret
  namespace: fleetops-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: fleetops-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: fleetops/prod/db
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: fleetops/prod/db
        property: password
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: fleetops/prod/db
        property: host
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleetops-app-secret
  namespace: fleetops-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: fleetops-app-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: fleetops/prod/jwt
        property: jwt_secret
---
# Why Secret not ConfigMap: allows injection as env var like other secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleetops-redis-secret
  namespace: fleetops-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: fleetops-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: /fleetops/prod/redis/endpoint
---
# Used by: maintenance-service AlarmBroadcastService
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleetops-sns-secret
  namespace: fleetops-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: fleetops-sns-secret
    creationPolicy: Owner
  data:
    - secretKey: INSURANCE_SNS_TOPIC_ARN
      remoteRef:
        key: /fleetops/prod/sns/insurance-alerts-arn
    - secretKey: SERVICE_SNS_TOPIC_ARN
      remoteRef:
        key: /fleetops/prod/sns/service-alerts-arn
---
# Used by: auth-service LambdaServiceInitializer to seed/refresh the lambda-service account
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleetops-lambda-service-secret
  namespace: fleetops-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: fleetops-lambda-service-secret
    creationPolicy: Owner
  data:
    - secretKey: LAMBDA_SERVICE_PASSWORD
      remoteRef:
        key: fleetops/prod/lambda-service-credentials
        property: password

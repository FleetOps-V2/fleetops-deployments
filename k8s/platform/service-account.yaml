# =============================================================
# FleetOps IRSA Service Account
# Annotated with the IAM role ARN from Terraform output:
#   module.iam.app_irsa_role_arn
# This SA is used by all FleetOps pods to access:
#   - Secrets Manager (DB creds, JWT)
#   - SSM Parameter Store (Redis endpoint, CORS)
#   - S3 (vehicle document uploads)
#   - Bedrock (AI Maintenance Advisor)
# =============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleetops-app
  namespace: fleetops-prod
  annotations:
    # Replace with actual ARN from: terraform output app_irsa_role_arn
    eks.amazonaws.com/role-arn: arn:aws:iam::538661800892:role/fleetops-prod-app-irsa-role
  labels:
    app.kubernetes.io/name: fleetops-app
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: kubectl

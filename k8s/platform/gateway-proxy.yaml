apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetops-gateway-proxy
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-gateway-proxy
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetops-gateway-proxy
      app.kubernetes.io/environment: platform
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetops-gateway-proxy
        app.kubernetes.io/environment: platform
        app.kubernetes.io/component: gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: fleetops-gateway-proxy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-gateway-proxy-config
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-gateway-proxy
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: gateway
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        
        location / {
            proxy_pass http://172.31.43.240:32708;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: fleetops-gateway-proxy
  namespace: fleetops-platform
  labels:
    app.kubernetes.io/name: fleetops-gateway-proxy
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: gateway
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: fleetops-gateway-proxy
    app.kubernetes.io/environment: platform
    app.kubernetes.io/component: gateway
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30082
    protocol: TCP

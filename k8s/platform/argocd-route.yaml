apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fleetops-argocd-route
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-argocd-route
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: argocd
spec:
  parentRefs:
    - name: fleetops-gateway
      namespace: fleetops-platform
  hostnames:
    - "argocd.98.86.98.79.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: argocd-server
          port: 80

apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-request-service-config
  namespace: fleetops-dev
  labels:
    app.kubernetes.io/name: fleetops-request-service
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: backend
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://fleetops-postgres:5432/request_db"
  # Kubernetes DNS — same namespace, so short names resolve correctly
  VEHICLE_SERVICE_URL: "http://fleetops-vehicle-service:8080"
  MAINTENANCE_SERVICE_URL: "http://fleetops-maintenance-service:8080"
  CORS_ALLOWED_ORIGINS: "*"

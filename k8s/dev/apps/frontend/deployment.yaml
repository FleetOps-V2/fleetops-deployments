apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetops-frontend
  namespace: fleetops-dev
  labels:
    app.kubernetes.io/name: fleetops-frontend
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetops-frontend
      app.kubernetes.io/environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetops-frontend
        app.kubernetes.io/environment: dev
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user (uid=101 in nginx:alpine)
        fsGroup: 101
      containers:
        - name: frontend
          image: johann2003/fleetops-frontend:latest  # Replace with CI-produced tag
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-frontend-config
  namespace: fleetops-dev
  labels:
    app.kubernetes.io/name: fleetops-frontend
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: frontend
data:
  # Nginx proxies to backend services using these names.
  # The nginx.conf is baked into the Docker image — these are informational only.
  # Actual proxy targets are: fleetops-auth-service:8080, fleetops-vehicle-service:8080,
  # fleetops-maintenance-service:8080, fleetops-request-service:8080
  # Note: Frontend image needs to be updated with correct service names
  NGINX_PORT: "80"

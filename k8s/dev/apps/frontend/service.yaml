apiVersion: v1
kind: Service
metadata:
  name: fleetops-frontend
  namespace: fleetops-dev
  labels:
    app.kubernetes.io/name: fleetops-frontend
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleetops-frontend
    app.kubernetes.io/environment: dev
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-maintenance-service-config
  namespace: fleetops-dev
  labels:
    app.kubernetes.io/name: fleetops-maintenance-service
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: backend
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://fleetops-postgres:5432/maintenance_db"
  CORS_ALLOWED_ORIGINS: "*"
  SPRING_PROFILES_ACTIVE: "dev"

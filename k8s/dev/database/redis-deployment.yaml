apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetops-redis
  namespace: fleetops-dev
  labels:
    app.kubernetes.io/name: fleetops-redis
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetops-redis
      app.kubernetes.io/environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetops-redis
        app.kubernetes.io/environment: dev
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # standard redis user in alpine images
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

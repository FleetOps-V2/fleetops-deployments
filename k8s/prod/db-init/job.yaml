apiVersion: batch/v1
kind: Job
metadata:
  name: fleetops-db-init
  namespace: fleetops-prod
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Delete the old Job before recreating — allows re-runs on every sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # Auto-delete 5 minutes after completion so ArgoCD does not flag it as stale
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: fleetops-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: db-init
          image: postgres:15-alpine
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_HOST
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGPORT
              value: "5432"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for PostgreSQL at $PGHOST..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL ready. Creating application databases..."
              for db in auth_db vehicle_db maintenance_db request_db; do
                exists=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres \
                  -tAc "SELECT 1 FROM pg_database WHERE datname = '$db'")
                if [ "$exists" = "1" ]; then
                  echo "  $db — already exists, skipping."
                else
                  psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres \
                    -c "CREATE DATABASE $db;"
                  echo "  $db — created."
                fi
              done
              echo "All databases ready."
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

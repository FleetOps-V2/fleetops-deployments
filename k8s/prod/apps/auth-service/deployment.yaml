# =============================================================
# Auth Service Deployment — EKS-native
# Changes from old version:
#   - serviceAccountName: fleetops-app (IRSA — no static AWS keys)
#   - image: ECR (not Docker Hub)
#   - POSTGRES_HOST from ESO-synced secret (not in-cluster postgres)
#   - JWT_SECRET from ESO-synced secret (not Sealed Secret)
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetops-auth-service
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-auth-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetops-auth-service
      app.kubernetes.io/environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetops-auth-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/environment: prod
    spec:
      # IRSA — pod-level AWS credential via projected service account token
      serviceAccountName: fleetops-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth-service
          # Replace ACCOUNT_ID with: terraform output → pipe to ECR URL
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/fleetops-dev/auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Config (non-sensitive, from ConfigMap)
          envFrom:
            - configMapRef:
                name: fleetops-auth-service-config
          env:
            # ── From ESO-synced Secrets Manager secret ─────────
            # POSTGRES_HOST must be declared BEFORE SPRING_DATASOURCE_URL
            # so Kubernetes $(VAR) substitution works correctly
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_HOST
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fleetops-app-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

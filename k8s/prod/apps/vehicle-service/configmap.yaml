apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-vehicle-service-config
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-vehicle-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kubectl
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://$(POSTGRES_HOST):5432/vehicle_db"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  # Redis — ElastiCache endpoint via ESO-synced SSM parameter
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_DATABASE: "0"
  CORS_ALLOWED_ORIGINS: "https://fleetops.website"
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
  # S3 bucket for vehicle document uploads (via IRSA — no AWS keys needed)
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "fleetops-dev-vehicle-docs"

apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-maintenance-service-config
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-maintenance-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kubectl
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://$(POSTGRES_HOST):5432/maintenance_db"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_DATABASE: "1"
  CORS_ALLOWED_ORIGINS: "https://fleetops.website"
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"
  AWS_REGION: "us-east-1"
  # Bedrock — AI Maintenance Advisor (Phase 7)
  BEDROCK_REGION: "us-east-1"
  BEDROCK_MODEL_ID: "anthropic.claude-haiku-20240307-v1:0"

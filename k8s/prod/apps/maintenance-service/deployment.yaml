apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetops-maintenance-service
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-maintenance-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetops-maintenance-service
      app.kubernetes.io/environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetops-maintenance-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/environment: prod
    spec:
      serviceAccountName: fleetops-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: maintenance-service
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/fleetops-dev/maintenance-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fleetops-maintenance-service-config
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_HOST
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fleetops-app-secret
                  key: JWT_SECRET
            # REDIS_HOST matches spring.data.redis.host: ${REDIS_HOST:redis} in application.yml
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: fleetops-redis-secret
                  key: REDIS_HOST
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

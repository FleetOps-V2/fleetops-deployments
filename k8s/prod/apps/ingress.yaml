apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleetops-ingress
  namespace: fleetops-prod
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "<injected by terraform — module.acm.certificate_arn>"
    alb.ingress.kubernetes.io/security-groups: "<injected by terraform — module.networking.alb_sg_id>"
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
spec:
  ingressClassName: alb
  rules:
    - host: fleetops.website
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: fleetops-auth-service
                port:
                  number: 8080
          - path: /api/audit
            pathType: Prefix
            backend:
              service:
                name: fleetops-auth-service
                port:
                  number: 8080
          - path: /api/vehicles
            pathType: Prefix
            backend:
              service:
                name: fleetops-vehicle-service
                port:
                  number: 8080
          - path: /api/tasks
            pathType: Prefix
            backend:
              service:
                name: fleetops-maintenance-service
                port:
                  number: 8080
          - path: /api/media
            pathType: Prefix
            backend:
              service:
                name: fleetops-maintenance-service
                port:
                  number: 8080
          - path: /api/requests
            pathType: Prefix
            backend:
              service:
                name: fleetops-request-service
                port:
                  number: 8080
          - path: /api/tracking
            pathType: Prefix
            backend:
              service:
                name: fleetops-vehicle-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetops-frontend
                port:
                  number: 80
    # origin.* host allows Lambda (non-VPC) to reach backend services directly via ALB,
    # bypassing CloudFront. CloudFront sends Host: origin.fleetops.website to the ALB, so
    # this rule is also required for CloudFront → ALB routing to work correctly.
    - host: origin.fleetops.website
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: fleetops-auth-service
                port:
                  number: 8080
          - path: /api/audit
            pathType: Prefix
            backend:
              service:
                name: fleetops-auth-service
                port:
                  number: 8080
          - path: /api/vehicles
            pathType: Prefix
            backend:
              service:
                name: fleetops-vehicle-service
                port:
                  number: 8080
          - path: /api/tasks
            pathType: Prefix
            backend:
              service:
                name: fleetops-maintenance-service
                port:
                  number: 8080
          - path: /api/media
            pathType: Prefix
            backend:
              service:
                name: fleetops-maintenance-service
                port:
                  number: 8080
          - path: /api/requests
            pathType: Prefix
            backend:
              service:
                name: fleetops-request-service
                port:
                  number: 8080
          - path: /api/tracking
            pathType: Prefix
            backend:
              service:
                name: fleetops-vehicle-service
                port:
                  number: 8080

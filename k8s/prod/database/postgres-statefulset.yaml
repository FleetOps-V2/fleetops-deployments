apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fleetops-postgres
  namespace: fleetops-prod
  labels:
    app.kubernetes.io/name: fleetops-postgres
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: database
spec:
  serviceName: fleetops-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetops-postgres
      app.kubernetes.io/environment: prod
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetops-postgres
        app.kubernetes.io/environment: prod
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleetops-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: fleetops-postgres-config
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-scripts
          configMap:
            name: fleetops-postgres-init-scripts
            defaultMode: 0755
      volumeClaimTemplates:
        - metadata:
            name: postgres-data
            labels:
              app.kubernetes.io/name: fleetops-postgres
              app.kubernetes.io/environment: prod
              app.kubernetes.io/component: storage
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: fleetops-nfs
            resources:
              requests:
                storage: 10Gi

# FleetOps Platform - Prod Environment Values
# Uses Semantic Versioning tags for controlled releases

namespace:
  name: fleetops-platform
  create: false

gateway:
  enabled: true
  replicas: 2
  image:
    registry: docker.io
    repository: johann2003/fleetops-gateway
    tag: latest  # CI will update this with SemVer when releases are created
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
    nodePort: 32708

gatewayProxy:
  enabled: true
  replicas: 2
  image:
    registry: docker.io
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 80
    nodePort: 30082
  config:
    upstreamGateway: "fleetops-gateway.fleetops-platform.svc.cluster.local:80"

argocd:
  enabled: true
  syncWave: "2"
  annotations:
    SyncOptions: "Prune=true"

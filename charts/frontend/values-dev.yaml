# FleetOps Frontend - Dev Environment Values
# Uses commit SHA tags for rapid iteration and exact traceability

image:
  registry: "538661800892.dkr.ecr.us-east-1.amazonaws.com"
  repository: fleetops-dev/frontend
  tag: bootstrap  # CI/CD will update this with develop-<sha> on develop push
  pullPolicy: Always
replicas: 1
service:
  port: 80
  type: ClusterIP
namespace:
  name: fleetops-dev
  create: false
probes:
  readiness:
    enabled: true
    path: /
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  liveness:
    enabled: true
    path: /
    port: 80
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 5
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
nginxConfig:
  enabled: true
argocd:
  enabled: true
  syncWave: "5"
  annotations:
    SyncOptions: "Prune=true"
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

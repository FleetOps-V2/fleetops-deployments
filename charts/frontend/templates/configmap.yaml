{{- if .Values.nginxConfig.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-frontend-nginx-config
  namespace: {{ include "fleetops-common.namespace" . }}
  labels:
    app.kubernetes.io/name: fleetops-frontend
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ALB health check stub — ALB probes /health on every target group including frontend
        location = /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /api/auth/ {
            proxy_pass http://fleetops-auth-service:8080/api/auth/;
        }

        location = /api/auth {
            proxy_pass http://fleetops-auth-service:8080/api/auth;
        }

        # AUDIT (CloudTrail events → auth-service)
        location /api/audit/ {
            proxy_pass http://fleetops-auth-service:8080/api/audit/;
        }

        location /api/vehicles/ {
            proxy_pass http://fleetops-vehicle-service:8080/api/vehicles/;
        }

        location = /api/vehicles {
            proxy_pass http://fleetops-vehicle-service:8080/api/vehicles;
        }

        # TRACKING (GPS telemetry — vehicle-service TrackingController)
        location /api/tracking/ {
            proxy_pass http://fleetops-vehicle-service:8080/api/tracking/;
        }

        location /api/tasks/ {
            proxy_pass http://fleetops-maintenance-service:8080/api/tasks/;
        }

        location = /api/tasks {
            proxy_pass http://fleetops-maintenance-service:8080/api/tasks;
        }

        # MEDIA (EFS shared inspection media vault)
        location /api/media/ {
            client_max_body_size 25M;
            proxy_pass http://fleetops-maintenance-service:8080/api/media/;
        }

        location /api/requests/ {
            proxy_pass http://fleetops-request-service:8080/api/requests/;
        }

        location = /api/requests {
            proxy_pass http://fleetops-request-service:8080/api/requests;
        }

        # React SPA - serve index.html for all other routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
{{- end }}

nameOverride: fleetops-frontend

image:
  registry: "538661800892.dkr.ecr.us-east-1.amazonaws.com"
  repository: fleetops-dev/frontend
  tag: ""  # Use values-dev.yaml or values-prod.yaml for environment-specific tags
  pullPolicy: IfNotPresent

replicas: 1

service:
  port: 80
  type: ClusterIP

namespace:
  name: fleetops-prod
  create: false

probes:
  readiness:
    enabled: true
    path: /health
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  liveness:
    enabled: true
    path: /health
    port: 80
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nginxConfig:
  enabled: true

argocd:
  enabled: true
  syncWave: "5"
  annotations:
    SyncOptions: "Prune=true"

serviceAccount:
  name: fleetops-app

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

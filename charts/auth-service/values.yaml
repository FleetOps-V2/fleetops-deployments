# FleetOps Auth Service — Default Helm Values
# Override with values-prod.yaml for AWS deployment

image:
  # ECR registry — set ACCOUNT_ID in values-prod.yaml
  registry: "538661800892.dkr.ecr.us-east-1.amazonaws.com"
  repository: fleetops-dev/auth-service
  tag: ""  # Set via --set image.tag=<git-sha> at deploy time; never use latest
  pullPolicy: IfNotPresent

replicas: 1

namespace:
  name: fleetops-prod
  create: false

service:
  port: 8080
  type: ClusterIP

# IRSA — all pods share the fleetops-app service account
serviceAccount:
  name: fleetops-app

# Spring Boot Actuator Probes
probes:
  startup:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 10
    timeoutSeconds: 5
  readiness:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  liveness:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Config injected via ConfigMap (non-sensitive)
config:
  jwtExpiration: "86400000"
  corsAllowedOrigins: "https://fleetops.website"
  springProfilesActive: "prod"
  # datasourceUrl uses $(POSTGRES_HOST) env var substitution at runtime
  datasourceUrl: "jdbc:postgresql://$(POSTGRES_HOST):5432/auth_db"

# ESO-synced Kubernetes secret names (secrets are created by ExternalSecret, not Helm)
secrets:
  postgres:
    name: fleetops-postgres-secret
    hostKey: POSTGRES_HOST
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  app:
    name: fleetops-app-secret
    jwtSecretKey: JWT_SECRET

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# ArgoCD
argocd:
  enabled: true
  syncWave: "3"

apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetops-auth-service-config
  namespace: {{ include "fleetops-common.namespace" . }}
  labels:
    app.kubernetes.io/name: fleetops-auth-service
    app.kubernetes.io/component: backend
    {{- include "fleetops-common.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  JWT_EXPIRATION: "{{ .Values.config.jwtExpiration }}"
  CORS_ALLOWED_ORIGINS: "{{ .Values.config.corsAllowedOrigins }}"
  SPRING_PROFILES_ACTIVE: "{{ .Values.config.springProfilesActive }}"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"

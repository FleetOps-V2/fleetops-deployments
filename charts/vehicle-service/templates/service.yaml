apiVersion: v1
kind: Service
metadata:
  name: fleetops-vehicle-service
  namespace: {{ include "fleetops-common.namespace" . }}
  labels:
    app.kubernetes.io/name: fleetops-vehicle-service
    app.kubernetes.io/component: backend
    {{- include "fleetops-common.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: fleetops-vehicle-service
    app.kubernetes.io/environment: {{ .Values.namespace.name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP

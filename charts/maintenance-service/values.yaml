image:
  registry: "538661800892.dkr.ecr.us-east-1.amazonaws.com"
  repository: fleetops-dev/maintenance-service
  tag: ""  # Set via --set image.tag=<git-sha> at deploy time; never use latest
  pullPolicy: IfNotPresent

replicas: 1
namespace:
  name: fleetops-prod
  create: false

service:
  port: 8080
  type: ClusterIP

serviceAccount:
  name: fleetops-app

probes:
  startup:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 10
    timeoutSeconds: 5
  readiness:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  liveness:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

efs:
  # Populated by terraform pipeline via environments/prod/infra-values.yaml.
  # EFS volume and mountPath activate automatically once efsId is non-empty.
  fileSystemId: ""      # e.g. fs-0abc1234def56789
  accessPointId: ""     # e.g. fsap-0abc1234def56789
  mountPath: /var/www/fleetops/shared-media

config:
  jwtExpiration: "86400000"
  corsAllowedOrigins: "https://fleetops.website"
  springProfilesActive: "prod"
  datasourceUrl: "jdbc:postgresql://$(POSTGRES_HOST):5432/maintenance_db"
  awsRegion: "us-east-1"
  

secrets:
  postgres:
    name: fleetops-postgres-secret
    hostKey: POSTGRES_HOST
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  app:
    name: fleetops-app-secret
    jwtSecretKey: JWT_SECRET
  redis:
    name: fleetops-redis-secret
    hostKey: REDIS_HOST
  sns:
    name: fleetops-sns-secret
    insuranceArnKey: INSURANCE_SNS_TOPIC_ARN
    serviceArnKey: SERVICE_SNS_TOPIC_ARN

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

argocd:
  enabled: true
  syncWave: "3"

# FleetOps Maintenance Service - Dev Environment Values
# Uses commit SHA tags for rapid iteration and exact traceability

image:
  registry: "538661800892.dkr.ecr.us-east-1.amazonaws.com"
  repository: fleetops-dev/maintenance-service
  tag: bootstrap  # CI/CD will update this with develop-<sha> on develop push
  pullPolicy: Always
replicas: 1
service:
  port: 8080
  type: ClusterIP
namespace:
  name: fleetops-dev
  create: false
probes:
  startup:
    enabled: true
    path: /health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 10
    timeoutSeconds: 5
  readiness:
    enabled: true
    path: /health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  liveness:
    enabled: true
    path: /health
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: false
config:
  springProfilesActive: "dev"
  datasourceUrl: "jdbc:postgresql://fleetops-postgres:5432/maintenance_db"
  corsAllowedOrigins: "*"
secrets:
  postgres:
    name: fleetops-postgres-secret
    hostKey: POSTGRES_HOST
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  app:
    name: fleetops-app-secret
    jwtSecretKey: JWT_SECRET
  redis:
    name: fleetops-redis-secret
    hostKey: REDIS_HOST
  sns:
    name: fleetops-sns-secret
    insuranceArnKey: INSURANCE_SNS_TOPIC_ARN
    serviceArnKey: SERVICE_SNS_TOPIC_ARN
argocd:
  enabled: true
  syncWave: "4"
  annotations:
    SyncOptions: "Prune=true"
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleetops-common.name" . }}
  namespace: {{ include "fleetops-common.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "fleetops-common.name" . }}
    app.kubernetes.io/component: backend
    {{- include "fleetops-common.labels" . | nindent 4 }}
  annotations:
    {{- include "fleetops-common.argocdAnnotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "fleetops-common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fleetops-common.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: maintenance-service
          image: {{ include "fleetops-common.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fleetops-maintenance-service-config
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.hostKey }}
            - name: SPRING_DATASOURCE_URL
              value: "{{ .Values.config.datasourceUrl }}"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.userKey }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.passwordKey }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.app.name }}
                  key: {{ .Values.secrets.app.jwtSecretKey }}
            # ElastiCache Redis endpoint via ESO-synced SSM parameter
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.name }}
                  key: {{ .Values.secrets.redis.hostKey }}
          {{- include "fleetops-common.springBootProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

# ArgoCD App — Platform resources (namespaces, IRSA SA, External Secrets)
# sync-wave: "0" — must run before all application services
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleetops-platform-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-platform
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/FleetOps-V2/fleetops-deployments.git
    targetRevision: HEAD
    path: k8s/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

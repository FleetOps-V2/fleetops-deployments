apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleetops-secrets-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-secrets-prod
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: security
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/FleetOps-V2/fleetops-deployments.git
    targetRevision: HEAD
    path: k8s/platform
    directory:
      include: "external-secrets.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground

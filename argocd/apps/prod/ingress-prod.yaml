apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleetops-ingress-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-ingress
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: networking
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/FleetOps-V2/fleetops-deployments.git
    targetRevision: HEAD
    path: charts/ingress
    helm:
      valueFiles:
        - values.yaml
        - /environments/dev/infra-values.yaml   # generated by GitHub Actions after terraform apply
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleetops-db-init-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-db-init-prod
    app.kubernetes.io/environment: prod
    app.kubernetes.io/component: db-init
  annotations:
    # Wave 2 — after ESO materialises fleetops-postgres-secret (wave 1),
    # before any application pods start (wave 3+).
    # ArgoCD waits for the Job to complete before proceeding to wave 3.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/FleetOps-V2/fleetops-deployments.git
    targetRevision: HEAD
    path: k8s/prod/db-init
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

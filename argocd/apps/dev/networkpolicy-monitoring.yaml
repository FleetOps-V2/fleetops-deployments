apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleetops-networkpolicy-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-networkpolicy-monitoring
    app.kubernetes.io/environment: monitoring
    app.kubernetes.io/component: networkpolicy
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/FleetOps-Project-Devops/fleetops-deployments.git
    targetRevision: HEAD
    path: k8s/policies/networkpolicies/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleetops-routes-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: fleetops-routes
    app.kubernetes.io/environment: dev
    app.kubernetes.io/component: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/johann2003/fleetops-deployments.git
    targetRevision: HEAD
    path: charts/routes
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fleetops-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
